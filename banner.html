<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; background: transparent; font-family:'Poppins', sans-serif; }
  .banner { position: relative; width: 100px; max-width: 100%; height: 40px; }
  .banner svg { position:absolute; top:0; left:0; width:100%; height:100%; display:block; }
  .banner-text { position:absolute; top:0; left:0; width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
  .banner-text span { font-size: 10px; font-weight:600; color:#ffffff; line-height:1.1; white-space:nowrap; }
</style>
</head>
<body>
  <div class="banner">
    <svg viewBox="0 0 900 260" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,260 L0,165 C0,55 85,0 215,0 L900,0 L900,95 C900,205 815,260 685,260 Z" fill="#2b2ecf" />
    </svg>
    <div class="banner-text"><span>Homepage</span></div>
  </div>
</body>
</html>
